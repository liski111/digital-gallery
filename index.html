<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>数字图像与视频处理 - 期末作品</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { overflow:hidden; background:#000; font-family:'Microsoft YaHei',sans-serif; }
        #canvas-container { width:100vw; height:100vh; position:fixed; top:0; left:0; }
        canvas { display:block; }
        #bottom-text { position:fixed; bottom:40px; left:0; width:100%; text-align:center; z-index:100; pointer-events:none; opacity:0; transition:opacity 1.5s ease-in-out; }
        #bottom-text.show { opacity:1; }
        #bottom-text p { color:rgba(255,255,255,0.7); font-size:16px; line-height:2; text-shadow:0 0 10px rgba(0,229,255,0.5); letter-spacing:2px; }
        #enter-btn { position:fixed; top:75%; left:50%; transform:translate(-50%,-50%); padding:18px 45px; background:rgba(0,229,255,0.1); border:2px solid #00E5FF; border-radius:50px; color:#00E5FF; font-size:20px; font-family:'Microsoft YaHei',sans-serif; cursor:pointer; z-index:200; opacity:0; transition:all 0.5s ease; letter-spacing:3px; box-shadow:0 0 20px rgba(0,229,255,0.3); }
        #enter-btn.show { opacity:1; }
        #enter-btn:hover { background:rgba(0,229,255,0.25); box-shadow:0 0 35px rgba(0,229,255,0.6); transform:translate(-50%,-50%) scale(1.08); }
        #video-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:1000; justify-content:center; align-items:center; }
        #video-overlay.active { display:flex; }
        #video-container { position:relative; width:85%; max-width:1200px; aspect-ratio:16/9; background:#000; border-radius:12px; overflow:hidden; box-shadow:0 0 50px rgba(0,229,255,0.4); }
        #video-player-container { width:100%; height:100%; }
        #video-player-container iframe { width:100%; height:100%; border:none; }
        #close-btn { position:absolute; top:15px; right:15px; width:48px; height:48px; background:rgba(0,0,0,0.6); border:2px solid #00E5FF; border-radius:50%; color:#00E5FF; font-size:28px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.3s; pointer-events:auto; z-index:10; box-shadow:0 0 15px rgba(0,229,255,0.4); }
        #close-btn:hover { background:rgba(179,71,234,0.7); border-color:#B347EA; color:#ffffff; transform:scale(1.15); box-shadow:0 0 25px rgba(179,71,234,0.6); }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="bottom-text">
        <p>指导教师：栗青生</p>
        <p>24电制2班  朱贝妮  刘睿希  林家如</p>
    </div>
    <button id="enter-btn">点击以查看数字展厅</button>
    <div id="video-overlay">
        <div id="video-container">
            <div id="video-player-container"></div>
            <div id="close-btn">✕</div>
        </div>
    </div>

    <script src="./three.min.js"></script>
    <script src="./OrbitControls.js"></script>

    <script>
        // 全局变量
        var scene, camera, renderer, controls;
        var titleSprite;
        var hotspots = [];
        var isVideoPlaying = false;
        var isPanoramaMode = false;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            createTextTitle();

            setTimeout(function() {
                document.getElementById('bottom-text').classList.add('show');
            }, 800);

            setTimeout(function() {
                document.getElementById('enter-btn').classList.add('show');
            }, 2000);

            document.getElementById('enter-btn').addEventListener('click', enterPanorama);
            document.getElementById('close-btn').addEventListener('click', closeVideo);
            document.getElementById('video-overlay').addEventListener('click', function(e) {
                if (e.target === document.getElementById('video-overlay')) {
                    closeVideo();
                }
            });

            animate();
        }

        // 创建文字标题（Canvas纹理Sprite）
        function createTextTitle() {
            var canvas = document.createElement('canvas');
            canvas.width = 2048;
            canvas.height = 600;
            var ctx = canvas.getContext('2d');

            ctx.clearRect(0, 0, 2048, 600);

            // 第一行
            ctx.fillStyle = 'rgba(255, 255, 255, 0.85)';
            ctx.font = 'bold 100px Microsoft YaHei, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('《数字图像与视频处理》', 1024, 220);

            // 第二行
            ctx.fillStyle = 'rgba(0, 229, 255, 0.85)';
            ctx.font = 'bold 90px Microsoft YaHei, sans-serif';
            ctx.fillText('期末作品', 1024, 380);

            var texture = new THREE.CanvasTexture(canvas);
            texture.minFilter = THREE.LinearFilter;
            texture.magFilter = THREE.LinearFilter;

            var material = new THREE.SpriteMaterial({
                map: texture,
                transparent: true,
                opacity: 0,
                depthWrite: false
            });

            titleSprite = new THREE.Sprite(material);
            titleSprite.scale.set(8, 2.35, 1);
            titleSprite.position.set(0, 0, -5);

            scene.add(titleSprite);

            var startTime = Date.now();
            function fadeIn() {
                var elapsed = (Date.now() - startTime) / 1000;
                if (elapsed < 2) {
                    titleSprite.material.opacity = Math.min(elapsed / 1.5, 0.85);
                    requestAnimationFrame(fadeIn);
                } else {
                    titleSprite.material.opacity = 0.85;
                }
            }
            fadeIn();
        }

        function enterPanorama() {
            if (isPanoramaMode) return;
            isPanoramaMode = true;

            document.getElementById('enter-btn').style.display = 'none';
            document.getElementById('bottom-text').style.display = 'none';

            if (titleSprite) {
                titleSprite.visible = false;
            }

            createPanorama();
            createHotspots();

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enablePan = false;
            controls.enableZoom = false;
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.minPolarAngle = Math.PI * 0.05;
            controls.maxPolarAngle = Math.PI * 0.95;
            controls.target.set(0, 0, -1);
        }

        function createPanorama() {
            var geometry = new THREE.SphereGeometry(10, 60, 40);
            var textureLoader = new THREE.TextureLoader();

            textureLoader.load(
                './数字展厅.png',
                function(texture) {
                    texture.mapping = THREE.EquirectangularReflectionMapping;
                    var material = new THREE.MeshBasicMaterial({
                        map: texture,
                        side: THREE.BackSide
                    });
                    var panoramaSphere = new THREE.Mesh(geometry, material);
                    scene.add(panoramaSphere);
                    console.log('全景图加载成功');
                },
                undefined,
                function(error) {
                    console.error('全景图加载失败:', error);
                }
            );
        }

        function createHotspots() {
            var hotspotConfigs = [
                { azimuth: 15, elevation: 0, bv: 'BV1Pr7T6gEsc' },
                { azimuth: 40, elevation: -10, bv: 'BV1Ck7T6BEkW' },
                { azimuth: -35, elevation: 8, bv: 'BV1Ck7T6BEtw' },
                { azimuth: 170, elevation: 0, bv: 'BV1Cr7T6uEXM' },
                { azimuth: -155, elevation: -8, bv: 'BV1Pr7T6gEtk' }
            ];

            hotspotConfigs.forEach(function(config, index) {
                var canvas = document.createElement('canvas');
                canvas.width = 256;
                canvas.height = 256;
                var ctx = canvas.getContext('2d');

                ctx.beginPath();
                ctx.arc(128, 128, 120, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(0, 229, 255, 0.3)';
                ctx.fill();
                ctx.strokeStyle = '#00E5FF';
                ctx.lineWidth = 4;
                ctx.stroke();

                ctx.fillStyle = '#00E5FF';
                ctx.font = 'bold 80px Microsoft YaHei, sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(String(index + 1), 128, 128);

                var texture = new THREE.CanvasTexture(canvas);
                var material = new THREE.SpriteMaterial({
                    map: texture,
                    transparent: true,
                    opacity: 0.9,
                    depthWrite: false
                });

                var sprite = new THREE.Sprite(material);

                var azimuth = THREE.MathUtils.degToRad(config.azimuth);
                var elevation = THREE.MathUtils.degToRad(config.elevation);
                var radius = 9.8;

                var x = radius * Math.cos(elevation) * Math.sin(azimuth);
                var y = radius * Math.sin(elevation);
                var z = -radius * Math.cos(elevation) * Math.cos(azimuth);

                sprite.position.set(x, y, z);
                sprite.scale.set(0.6, 0.6, 1);

                sprite.userData = { bv: config.bv };

                sprite.onBeforeRender = function() {
                    sprite.lookAt(camera.position);
                };

                scene.add(sprite);
                hotspots.push(sprite);
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function onMouseMove(event) {
            if (isVideoPlaying) return;
        }

        function onMouseClick(event) {
            if (isVideoPlaying) return;

            var mouse = new THREE.Vector2();
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            var raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);

            var intersects = raycaster.intersectObjects(hotspots);
            if (intersects.length > 0) {
                var hotspot = intersects[0].object;
                openVideo(hotspot.userData.bv);
            }
        }

        function openVideo(bvCode) {
            var overlay = document.getElementById('video-overlay');
            var container = document.getElementById('video-player-container');

            container.innerHTML = '';
            var iframe = document.createElement('iframe');
            iframe.src = 'https://player.bilibili.com/player.html?bvid=' + bvCode + '&page=1&autoplay=1&danmaku=0';
            iframe.style.width = '100%';
            iframe.style.height = '100%';
            iframe.style.border = 'none';
            iframe.allowFullscreen = true;
            iframe.allow = 'autoplay';
            container.appendChild(iframe);

            overlay.classList.add('active');
            if (controls) controls.enabled = false;
            isVideoPlaying = true;
        }

        function closeVideo() {
            var overlay = document.getElementById('video-overlay');
            var container = document.getElementById('video-player-container');

            container.innerHTML = '';
            overlay.classList.remove('active');
            if (controls) controls.enabled = true;
            isVideoPlaying = false;
        }

        function animate() {
            requestAnimationFrame(animate);

            if (controls && isPanoramaMode) {
                controls.update();
            }

            if (titleSprite && titleSprite.visible) {
                titleSprite.lookAt(camera.position);
            }

            renderer.render(scene, camera);
        }

        init();

        renderer.domElement.addEventListener('mousemove', onMouseMove);
        renderer.domElement.addEventListener('click', onMouseClick);
        window.addEventListener('resize', onWindowResize);
    </script>
</body>
</html>
